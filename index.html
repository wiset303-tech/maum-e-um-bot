<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>마음e음봇</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --mint:    #4ecdb4;
  --mint2:   #2aab90;
  --mint3:   #d4f5ee;
  --mint4:   #eafaf6;
  --peach:   #ffb08a;
  --peach2:  #fff0e8;
  --lemon:   #ffe97a;
  --lemon2:  #fffbe8;
  --lav:     #c4b0f5;
  --lav2:    #f0ecff;
  --sky:     #80ccf0;
  --sky2:    #e8f6ff;
  --rose:    #ffaaaa;
  --rose2:   #fff0f0;
  --navy:    #2c4a5a;
  --gray:    #7a8c98;
  --lgray:   #eef2f5;
  --cream:   #fffdf8;
  --white:   #ffffff;
  --shadow:  0 8px 32px rgba(78,205,180,.15);
  --shadow2: 0 2px 12px rgba(0,0,0,.08);
  --r:       20px;
  --r2:      14px;
  --GAS_URL: 'https://script.google.com/macros/s/AKfycbxef53CsHzTsfsd1LQV5hyZWcrDmamy0jcRRmJYDd8b-PGk4duvvaouFNEuPH1hcHQ2Yw/exec';
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--cream)}
body{font-family:'Noto Sans KR',sans-serif;color:var(--navy);touch-action:manipulation}

/* ── 유틸 ── */
.hidden{display:none!important}
.gaegu{font-family:'Black Han Sans',sans-serif}
.flex{display:flex}
.col{flex-direction:column}
.center{align-items:center;justify-content:center}
.gap8{gap:8px}
.gap12{gap:12px}
.gap16{gap:16px}

/* ── 토스트 ── */
#toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--navy);color:#fff;
  font-size:13px;padding:10px 20px;border-radius:30px;
  transition:transform .3s,opacity .3s;opacity:0;z-index:9999;white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── 모달 오버레이 ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;
  z-index:500;backdrop-filter:blur(4px);
}
.modal-box{
  background:#fff;border-radius:24px;padding:28px 24px;
  width:min(360px,90vw);box-shadow:0 20px 60px rgba(0,0,0,.2);
  animation:popIn .25s ease;
}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.modal-title{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--mint2);margin-bottom:16px;text-align:center}
.modal-close{
  position:absolute;top:14px;right:16px;
  background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray);
}

/* ── 버튼 ── */
.btn{
  border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  border-radius:var(--r2);transition:transform .15s,box-shadow .15s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn:active{transform:scale(.96)}
.btn-primary{
  background:linear-gradient(135deg,var(--mint),var(--mint2));
  color:#fff;font-size:15px;font-weight:700;padding:14px 20px;
  box-shadow:0 4px 16px rgba(78,205,180,.4);width:100%;
}
.btn-secondary{
  background:var(--lgray);color:var(--navy);font-size:14px;padding:11px 18px;width:100%;
}
.btn-peach{background:linear-gradient(135deg,#ffcba0,var(--peach));color:#fff;font-size:14px;font-weight:700;padding:12px 18px}
.btn-lav{background:linear-gradient(135deg,#d4c0f8,var(--lav));color:#fff;font-size:14px;font-weight:700;padding:12px 18px}
.btn-sm{font-size:12px;padding:7px 14px;border-radius:10px}
.btn-icon{background:none;border:none;cursor:pointer;font-size:22px;padding:6px}

/* ── 인풋 ── */
.inp{
  width:100%;border:2px solid var(--lgray);border-radius:var(--r2);
  padding:12px 16px;font-size:14px;font-family:'Noto Sans KR',sans-serif;
  outline:none;transition:border-color .2s;background:#fff;
}
.inp:focus{border-color:var(--mint)}
.inp-wrap{position:relative;margin-bottom:12px}
.inp-label{font-size:12px;color:var(--gray);margin-bottom:4px;font-weight:500}

/* ════════════════════════════════════════
   화면 1: 로딩
════════════════════════════════════════ */
/* ── 로딩 화면 ── */
#screen-loading{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  z-index:1000;overflow:hidden;
  background:#c2ede4;
}
#loading-bg-img{
  position:absolute;
  top:0;left:50%;transform:translateX(-50%);
  height:100%;width:auto;
  min-width:100%;
  object-fit:cover;
  object-position:center top;
}
.loading-bottom{
  position:absolute;
  bottom:0;left:0;right:0;
  z-index:10;
  padding:0 40px 52px;
  display:flex;flex-direction:column;align-items:center;
  background:linear-gradient(transparent,rgba(180,230,218,.88) 28%,rgba(180,230,218,.96) 60%);
}
.loading-title{
  font-family:'Black Han Sans',sans-serif;
  font-size:28px;
  color:rgba(20,70,50,0.25);
  margin-bottom:2px;
  transition:color .5s ease;
  white-space:nowrap;
}
.loading-sub{
  font-size:14px;
  color:rgba(20,70,50,0.25);
  margin-bottom:18px;
  transition:color .5s ease;
}
.loading-bar-wrap{
  width:min(240px,65vw);
  background:rgba(255,255,255,.4);
  border-radius:20px;
  height:13px;
  overflow:hidden;
  box-shadow:0 2px 10px rgba(78,205,180,.3);
}
.loading-bar{
  height:100%;width:0%;
  background:linear-gradient(90deg,#4ecdb4,#2aab90);
  border-radius:20px;
  transition:width .7s cubic-bezier(.4,0,.2,1);
}
.loading-status{
  font-size:12px;
  color:rgba(20,70,50,0.3);
  margin-top:9px;
  height:17px;
  transition:color .5s ease;
}

/* ════════════════════════════════════════
   화면 2: NFC 태깅 대기 (로그인)
════════════════════════════════════════ */
#screen-nfc{
  position:fixed;inset:0;
  background:linear-gradient(160deg,#c2ede4,#cde6f8,#e8e0fc);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;
}
.nfc-top{text-align:center;margin-bottom:32px}
.nfc-top h1{font-family:'Black Han Sans',sans-serif;font-size:36px;color:var(--mint2)}
.nfc-top p{font-size:13px;color:var(--gray);margin-top:4px}

.nfc-anim-wrap{
  position:relative;width:180px;height:180px;
  display:flex;align-items:center;justify-content:center;margin-bottom:32px;
}
.nfc-ripple{
  position:absolute;border-radius:50%;
  border:3px solid var(--mint);opacity:0;
  animation:ripple 2.4s ease-out infinite;
}
.nfc-ripple:nth-child(1){width:80px;height:80px;animation-delay:0s}
.nfc-ripple:nth-child(2){width:120px;height:120px;animation-delay:.6s}
.nfc-ripple:nth-child(3){width:160px;height:160px;animation-delay:1.2s}
.nfc-ripple:nth-child(4){width:180px;height:180px;animation-delay:1.8s}
@keyframes ripple{
  0%{opacity:.7;transform:scale(.8)}
  100%{opacity:0;transform:scale(1)}
}
.nfc-icon{
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,var(--mint),var(--mint2));
  display:flex;align-items:center;justify-content:center;
  font-size:36px;box-shadow:0 8px 24px rgba(78,205,180,.4);
  z-index:1;position:relative;
}
.nfc-msg{font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--navy);margin-bottom:24px}
.nfc-bypass{font-size:13px;color:var(--gray);text-decoration:underline;cursor:pointer;background:none;border:none}
.nfc-settings{position:absolute;top:20px;right:20px;font-size:26px;cursor:pointer;background:none;border:none}

/* ── NFC 입력 숨김 필드 (ACR122U HID 입력용) ── */
#nfc-input{
  position:absolute;opacity:0;width:1px;height:1px;
  top:50%;left:50%;pointer-events:none;
}

/* ════════════════════════════════════════
   화면 공통: 앱 컨테이너
════════════════════════════════════════ */
#app{
  position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;
}
.app-header{
  background:#fff;padding:14px 18px 10px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 12px rgba(0,0,0,.06);flex-shrink:0;
}
.app-header-title{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--mint2)}
.app-header-user{font-size:12px;color:var(--gray)}
.app-header-right{display:flex;align-items:center;gap:10px}

/* ── 탭 바 ── */
.tab-bar{
  display:flex;background:#fff;border-bottom:2px solid var(--mint3);
  overflow-x:auto;flex-shrink:0;scrollbar-width:none;
}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{
  flex-shrink:0;background:none;border:none;
  font-family:'Black Han Sans',sans-serif;font-size:14px;
  color:var(--gray);padding:10px 16px 8px;cursor:pointer;
  border-bottom:3px solid transparent;margin-bottom:-2px;
  transition:all .2s;white-space:nowrap;
}
.tab-btn.active{color:var(--mint2);border-bottom-color:var(--mint2);font-weight:700}

/* ── 탭 패널 ── */
.tab-panels{flex:1;overflow:hidden;position:relative}
.tab-panel{
  position:absolute;inset:0;overflow-y:auto;
  padding:16px;display:none;
}
.tab-panel.active{display:block;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── 카드 ── */
.card{
  background:#fff;border-radius:var(--r);padding:18px 16px;
  margin-bottom:14px;box-shadow:var(--shadow2);
}
.card-mint{border-left:4px solid var(--mint)}
.card-peach{border-left:4px solid var(--peach)}
.card-lav{border-left:4px solid var(--lav)}
.card-sky{border-left:4px solid var(--sky)}
.card-label{font-family:'Black Han Sans',sans-serif;font-size:13px;color:var(--mint2);margin-bottom:8px}
.card h3{font-size:15px;font-weight:700;margin-bottom:8px}

/* ════════════════════════════════════════
   대시보드
════════════════════════════════════════ */
.weather-box{
  background:linear-gradient(135deg,var(--mint3),var(--lav2));
  border-radius:var(--r);padding:20px;margin-bottom:14px;
  text-align:center;position:relative;overflow:hidden;
  transition:min-height .5s ease;
  min-height:120px;
}
.weather-emoji{font-size:64px;display:block;margin-bottom:8px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.weather-label{font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--navy)}
.weather-sub{font-size:12px;color:var(--gray);margin-top:4px}

.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{
  background:#fff;border-radius:var(--r2);padding:14px 10px;
  text-align:center;box-shadow:var(--shadow2);
}
.stat-card .num{font-family:'Black Han Sans',sans-serif;font-size:28px;color:var(--mint2)}
.stat-card .lbl{font-size:11px;color:var(--gray);margin-top:2px}

.warmth-bar{
  background:#fff;border-radius:var(--r2);padding:14px 16px;
  margin-bottom:14px;box-shadow:var(--shadow2);
}
.warmth-title{font-family:'Black Han Sans',sans-serif;font-size:14px;color:var(--navy);margin-bottom:8px}
.warmth-dots{display:flex;gap:8px}
.warmth-dot{
  width:32px;height:32px;border-radius:50%;
  background:var(--lgray);font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:background .3s;
}
.warmth-dot.filled{background:linear-gradient(135deg,var(--peach),#ff8a50)}

.emotion-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.emotion-chip{
  padding:4px 12px;border-radius:14px;font-size:12px;font-weight:600;
  display:flex;align-items:center;gap:4px;
}
.chip-pos{background:var(--mint3);color:var(--mint2)}
.chip-neu{background:var(--lemon2);color:#8a7200}
.chip-neg{background:var(--rose2);color:#a03030}

/* ════════════════════════════════════════
   학생 관리
════════════════════════════════════════ */
.student-item{
  background:#fff;border-radius:var(--r2);padding:14px 16px;
  margin-bottom:10px;box-shadow:var(--shadow2);
  display:flex;align-items:center;gap:12px;
}
.student-item.inactive{opacity:.5}
.student-avatar{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--mint3),var(--mint));
  display:flex;align-items:center;justify-content:center;
  font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--mint2);flex-shrink:0;
}
.student-info{flex:1}
.student-name{font-weight:700;font-size:14px}
.student-id{font-size:11px;color:var(--gray);margin-top:2px}
.student-nfc{font-size:10px;color:var(--mint2);margin-top:2px}
.student-actions{display:flex;gap:6px}

/* NFC 등록 팝업 */
.nfc-register-wrap{
  text-align:center;padding:20px 0;
}
.nfc-register-anim{
  width:100px;height:100px;border-radius:50%;
  background:linear-gradient(135deg,var(--mint3),var(--mint));
  display:flex;align-items:center;justify-content:center;
  font-size:48px;margin:0 auto 16px;
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(78,205,180,.4)}50%{transform:scale(1.05);box-shadow:0 0 0 16px rgba(78,205,180,0)}}
.nfc-register-status{font-family:'Black Han Sans',sans-serif;font-size:16px;color:var(--navy)}

/* ════════════════════════════════════════
   감정 입력 (학생)
════════════════════════════════════════ */
.welcome-banner{
  background:linear-gradient(135deg,var(--mint),var(--mint2));
  border-radius:var(--r);padding:20px;margin-bottom:16px;color:#fff;text-align:center;
}
.welcome-banner h2{font-family:'Black Han Sans',sans-serif;font-size:24px}
.welcome-banner p{font-size:13px;opacity:.85;margin-top:4px}

.macro-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.macro-btn{
  border:3px solid transparent;border-radius:var(--r2);padding:16px 8px;
  text-align:center;cursor:pointer;background:#fff;box-shadow:var(--shadow2);
  transition:all .2s;
}
.macro-btn:hover,.macro-btn.selected{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.macro-btn .emoji{font-size:36px;display:block;margin-bottom:6px}
.macro-btn .lbl{font-family:'Black Han Sans',sans-serif;font-size:14px;color:var(--navy)}
.macro-btn.pos.selected{border-color:var(--mint);background:var(--mint4)}
.macro-btn.neu.selected{border-color:#f5c400;background:var(--lemon2)}
.macro-btn.neg.selected{border-color:var(--rose);background:var(--rose2)}

.micro-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;
}
.micro-btn{
  background:#fff;border:2px solid var(--lgray);border-radius:12px;
  padding:10px 6px;text-align:center;cursor:pointer;font-size:13px;
  font-family:'Noto Sans KR',sans-serif;transition:all .2s;
}
.micro-btn.selected{border-color:var(--mint);background:var(--mint4);color:var(--mint2);font-weight:700}
.micro-btn.custom-btn{border-color:var(--peach);color:var(--peach)}
.micro-btn.more-btn{border-color:var(--lav);color:var(--lav)}

/* ════════════════════════════════════════
   봇 대화
════════════════════════════════════════ */
.chat-wrap{
  display:flex;flex-direction:column;height:calc(100vh - 180px);
}
.chat-messages{
  flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:10px;
}
.chat-msg{display:flex;gap:8px;max-width:85%}
.chat-msg.bot{align-self:flex-start}
.chat-msg.user{align-self:flex-end;flex-direction:row-reverse}
.chat-avatar{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--mint),var(--mint2));
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.chat-bubble{
  padding:10px 14px;border-radius:16px;font-size:13.5px;line-height:1.65;
}
.chat-msg.bot .chat-bubble{background:var(--mint4);border-radius:4px 16px 16px 16px}
.chat-msg.user .chat-bubble{background:linear-gradient(135deg,var(--mint),var(--mint2));color:#fff;border-radius:16px 4px 16px 16px}
.chat-input-row{display:flex;gap:8px;padding-top:10px}
.chat-input{
  flex:1;border:2px solid var(--lgray);border-radius:20px;
  padding:10px 16px;font-size:14px;outline:none;
  font-family:'Noto Sans KR',sans-serif;
}
.chat-input:focus{border-color:var(--mint)}
.chat-send{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--mint),var(--mint2));
  border:none;cursor:pointer;font-size:18px;color:#fff;flex-shrink:0;
}

/* ════════════════════════════════════════
   마음토큰
════════════════════════════════════════ */
.token-balance{
  background:linear-gradient(135deg,var(--lemon),#f5c400);
  border-radius:var(--r);padding:20px;text-align:center;margin-bottom:14px;
}
.token-balance .amount{font-family:'Black Han Sans',sans-serif;font-size:52px;color:var(--navy)}
.token-balance .lbl{font-size:13px;color:var(--navy);opacity:.7}
.token-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}

/* ════════════════════════════════════════
   마음앨범
════════════════════════════════════════ */
.album-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.album-item{
  border-radius:var(--r2);overflow:hidden;
  box-shadow:var(--shadow2);position:relative;cursor:pointer;
}
.album-item img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.album-item .album-date{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.5));
  color:#fff;font-size:11px;padding:8px 8px 6px;
}
.album-empty{text-align:center;padding:40px;color:var(--gray);font-family:'Black Han Sans',sans-serif;font-size:16px}

/* ════════════════════════════════════════
   설정 패널
════════════════════════════════════════ */
.settings-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0;border-bottom:1px solid var(--lgray);
}
.settings-item:last-child{border-bottom:none}
.settings-label{font-size:14px;font-weight:500}
.settings-sub{font-size:12px;color:var(--gray);margin-top:2px}
/* 토글 */
.toggle{position:relative;width:46px;height:26px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{
  position:absolute;inset:0;background:var(--lgray);border-radius:13px;cursor:pointer;transition:.3s;
}
.toggle-slider::before{
  content:'';position:absolute;width:20px;height:20px;
  left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;
}
.toggle input:checked+.toggle-slider{background:var(--mint)}
.toggle input:checked+.toggle-slider::before{transform:translateX(20px)}

/* ════════════════════════════════════════
   로그인 모달
════════════════════════════════════════ */
#modal-login .modal-box{position:relative}
#modal-settings .modal-box{position:relative}

/* ── 반응형 (PC) ── */
@media(min-width:640px){
  #app{max-width:480px;left:50%;transform:translateX(-50%);box-shadow:0 0 60px rgba(0,0,0,.15)}
  #screen-nfc,#screen-loading{max-width:480px;left:50%;transform:translateX(-50%)}
}
</style>
</head>
<body>

<!-- ══ NFC 태깅 대기 (로그인) 화면 ══ -->
<div id="screen-nfc" class="hidden">
  <button class="nfc-settings btn-icon" onclick="openSettings()">⚙️</button>
  <div class="nfc-top">
    <h1 class="gaegu">마음e음 봇</h1>
    <p>카드를 가까이 대주세요 🪪</p>
  </div>
  <div class="nfc-anim-wrap">
    <div class="nfc-ripple"></div>
    <div class="nfc-ripple"></div>
    <div class="nfc-ripple"></div>
    <div class="nfc-ripple"></div>
    <div class="nfc-icon">🪪</div>
  </div>
  <div class="nfc-msg gaegu" id="nfcMsg">카드를 대주세요</div>
  <button class="nfc-bypass" onclick="openLoginModal()">카드가 없어요 (아이디로 로그인)</button>
  <button class="nfc-bypass" style="margin-top:8px;color:var(--mint2)" onclick="testWebNFC()">📡 NFC 기능 테스트</button>
  <!-- ACR122U HID 입력 수신용 숨김 인풋 -->
  <input id="nfc-input" type="text" autocomplete="off" readonly>
</div>

<!-- ══ 앱 메인 ══ -->
<div id="app" class="hidden">
  <div class="app-header">
    <div>
      <div class="app-header-title gaegu">마음e음 봇 🌱</div>
      <div class="app-header-user" id="headerUser"></div>
    </div>
    <div class="app-header-right">
      <button class="btn-icon" onclick="openSettings()">⚙️</button>
      <button class="btn btn-sm btn-secondary" onclick="logout()" style="width:auto;padding:7px 14px">로그아웃</button>
    </div>
  </div>
  <div class="tab-bar" id="tabBar"></div>
  <div class="tab-panels" id="tabPanels"></div>
</div>

<!-- ══ 모달: 로그인 ══ -->
<div id="modal-login" class="modal-overlay hidden" onclick="closeModalOutside(event,'modal-login')">
  <div class="modal-box" style="position:relative">
    <div class="modal-title">🔐 로그인</div>
    <button class="modal-close" onclick="closeModal('modal-login')">✕</button>
    <div class="inp-label">아이디</div>
    <input class="inp inp-wrap" id="login-id" placeholder="아이디를 입력하세요" autocomplete="off" onkeydown="if(event.key===&quot;Enter&quot;)loginByPw()">
    <div class="inp-label" style="margin-top:8px">비밀번호</div>
    <input class="inp" id="login-pw" type="password" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key===&quot;Enter&quot;)loginByPw()">
    <button class="btn btn-primary" style="margin-top:16px" onclick="loginByPw()">로그인하기</button>
  </div>
</div>

<!-- ══ 모달: 설정 ══ -->
<div id="modal-settings" class="modal-overlay hidden" onclick="closeModalOutside(event,'modal-settings')">
  <div class="modal-box" style="position:relative">
    <div class="modal-title">⚙️ 설정</div>
    <button class="modal-close" onclick="closeModal('modal-settings')">✕</button>
    <div class="settings-item">
      <div><div class="settings-label">🔔 등교 알림</div><div class="settings-sub">태깅 시 알림</div></div>
      <label class="toggle"><input type="checkbox" id="set-alarm-checkin" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="settings-item">
      <div><div class="settings-label">⚠️ 위기 알림</div><div class="settings-sub">부정 감정 연속 시</div></div>
      <label class="toggle"><input type="checkbox" id="set-alarm-crisis" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="settings-item">
      <div><div class="settings-label">🎵 배경음악</div></div>
      <label class="toggle"><input type="checkbox" id="set-bgm"><span class="toggle-slider"></span></label>
    </div>
  </div>
</div>

<!-- ══ 모달: NFC 학생 등록 ══ -->
<div id="modal-nfc-register" class="modal-overlay hidden" onclick="closeModalOutside(event,'modal-nfc-register')">
  <div class="modal-box" style="position:relative">
    <div class="modal-title">🪪 카드 등록</div>
    <button class="modal-close" onclick="closeModal('modal-nfc-register')">✕</button>
    <div class="nfc-register-wrap">
      <div class="nfc-register-anim" id="nfcRegisterAnim">🪪</div>
      <div class="nfc-register-status gaegu" id="nfcRegisterStatus">카드를 가까이 대주세요</div>
      <div style="font-size:12px;color:var(--gray);margin-top:8px" id="nfcRegisterUid"></div>
    </div>
    <div style="border-top:1px solid var(--lgray);margin-top:16px;padding-top:14px;text-align:center">
      <div style="font-size:12px;color:var(--gray);margin-bottom:10px">카드가 없거나 인식이 안 되나요?</div>
      <button class="btn btn-secondary" onclick="skipNfcRegister()" style="width:auto;padding:10px 20px;font-size:13px">
        🖊️ NFC 없이 직접 등록하기
      </button>
    </div>
  </div>
</div>

<!-- ══ 모달: 학생 폼 ══ -->
<div id="modal-student-form" class="modal-overlay hidden" onclick="closeModalOutside(event,'modal-student-form')">
  <div class="modal-box" style="position:relative;max-height:90vh;overflow-y:auto">
    <div class="modal-title">👤 학생 등록</div>
    <button class="modal-close" onclick="closeModal('modal-student-form')">✕</button>
    <input type="hidden" id="sf-nfc-uid">
    <div class="inp-label">이름</div>
    <input class="inp" id="sf-name" placeholder="학생 이름" style="margin-bottom:10px">
    <div class="inp-label">번호</div>
    <input class="inp" id="sf-num" type="number" placeholder="출석번호" style="margin-bottom:10px">
    <div class="inp-label">자동 생성 아이디</div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input class="inp" id="sf-id" placeholder="아이디" style="margin-bottom:0;flex:1">
      <button class="btn btn-secondary btn-sm" style="width:auto;flex-shrink:0" onclick="generateId()">재생성</button>
    </div>
    <div class="inp-label">비밀번호</div>
    <input class="inp" id="sf-pw" placeholder="기본: maum1234" style="margin-bottom:16px">
    <button class="btn btn-primary" onclick="submitStudentForm()">등록 완료</button>
  </div>
</div>

<!-- ══ 모달: 소감정 더보기 ══ -->
<div id="modal-more-emotions" class="modal-overlay hidden" onclick="closeModalOutside(event,'modal-more-emotions')">
  <div class="modal-box" style="position:relative;max-height:80vh;overflow-y:auto">
    <div class="modal-title">감정 더 찾기 ➕</div>
    <button class="modal-close" onclick="closeModal('modal-more-emotions')">✕</button>
    <div id="more-emotions-list" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px"></div>
  </div>
</div>

<!-- ══ 모달: 교사 등록 폼 ══ -->
<div id="modal-teacher-form" class="modal-overlay hidden" onclick="closeModalOutside(event,'modal-teacher-form')">
  <div class="modal-box" style="position:relative;max-height:90vh;overflow-y:auto">
    <div class="modal-title">👩‍🏫 교사 등록</div>
    <button class="modal-close" onclick="closeModal('modal-teacher-form')">✕</button>
    <div class="inp-label">이름</div>
    <input class="inp" id="tf-name" placeholder="교사 이름" style="margin-bottom:10px">
    <div class="inp-label">아이디</div>
    <input class="inp" id="tf-id" placeholder="로그인 아이디" style="margin-bottom:10px">
    <div class="inp-label">비밀번호</div>
    <input class="inp" id="tf-pw" type="password" placeholder="비밀번호" style="margin-bottom:10px">

<script>
// ════════════════════════════════════════
// 설정
// ════════════════════════════════════════
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxef53CsHzTsfsd1LQV5hyZWcrDmamy0jcRRmJYDd8b-PGk4duvvaouFNEuPH1hcHQ2Yw/exec';

// ════════════════════════════════════════
// 오디오 시스템
// ════════════════════════════════════════
var AUDIO = {
  bgm     : null,
  enabled : { bgm: false, sfx: true },

  // 배경음악 — GitHub에 bgm.mp3 파일 업로드 후 경로 지정
  initBgm: function() {
    if (this.bgm) return;
    this.bgm = new Audio('./bgm.mp3');
    this.bgm.loop = true;
    this.bgm.volume = 0.35;
  },

  playBgm: function() {
    this.initBgm();
    if (this.enabled.bgm && this.bgm) {
      var p = this.bgm.play();
      if (p) p.catch(function(e){ console.log('BGM:', e.message); });
    }
  },

  stopBgm: function() {
    if (this.bgm) this.bgm.pause();
  },

  toggleBgm: function(on) {
    this.enabled.bgm = on;
    on ? this.playBgm() : this.stopBgm();
  },

  // 효과음 파일 목록 (GitHub에 아래 파일명으로 업로드하면 자동 연결)
  // sfx_login.mp3   → 로그인 성공 시
  // sfx_error.mp3   → 오류 발생 시
  // sfx_nfc.mp3     → NFC 카드 태깅 시
  // sfx_save.mp3    → 감정/토큰 저장 시
  // sfx_gift.mp3    → 토큰 선물 시
  // sfx_tap.mp3     → 버튼 탭 시
  sfxCache: {},
  sfx: function(type) {
    if (!this.enabled.sfx) return;
    try {
      var fileName = './sfx_' + type + '.mp3';
      if (!this.sfxCache[type]) {
        this.sfxCache[type] = new Audio(fileName);
      }
      var a = this.sfxCache[type];
      a.currentTime = 0;
      a.play().catch(function(){});
    } catch(e) {}
  }
};

// ════════════════════════════════════════
// 상태
// ════════════════════════════════════════

  role: null,          // admin / teacher / student

  emotions: [],        // 감정 마스터 데이터
  students: [],        // 학생 목록

// ════════════════════════════════════════
// API 호출
// ════════════════════════════════════════
async function api(action, data) {
  data = data || {};
  return new Promise(function(resolve) {
    // GAS CORS 우회: 폼 POST 방식
    var payload = JSON.stringify(Object.assign({ action: action }, data));
    var xhr = new XMLHttpRequest();
    xhr.open('POST', GAS_URL, true);
    xhr.setRequestHeader('Content-Type', 'text/plain;charset=utf-8');
    xhr.onload = function() {
      try { resolve(JSON.parse(xhr.responseText)); }
      catch(e) { resolve({ status:'error', message:'파싱오류:'+xhr.responseText.slice(0,80) }); }
    };
    xhr.onerror = function() {
      resolve({ status:'error', message:'네트워크 오류' });
    };
    xhr.ontimeout = function() {
      resolve({ status:'error', message:'요청 시간 초과' });
    };
    xhr.timeout = 15000;
    xhr.send(payload);
  });
}

// ════════════════════════════════════════

// ════════════════════════════════════════
function toast(msg, dur=2500) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function openModal(id) { document.getElementById(id).classList.remove('hidden'); }

// 로딩 화면

async function startLoading() {
  var bar    = document.getElementById('loadingBar');
  var status = document.getElementById('loadingStatus');
  var title  = document.getElementById('loadingTitle');
  var sub    = document.getElementById('loadingSub');
  var heart  = document.getElementById('loadingHeart');

  function setProgress(pct) {
    // 글자색: 30% → 100% opacity로 점점 진하게
    var opacity = 0.3 + (pct / 100) * 0.7;
    var color = 'rgba(20,70,50,' + opacity.toFixed(2) + ')';
    if(title)  title.style.color  = color;
    if(sub)    sub.style.color    = color;
    if(status) status.style.color = color;
    // 로딩바
    if(bar) bar.style.width = pct + '%';
    // 100% → 하트 분홍
    if(pct >= 100 && heart) {
      heart.style.color      = '#ff6b9d';
      heart.style.transition = 'color .5s ease';
    }
  }

  var steps = [
    { msg:'감정 데이터 불러오는 중...', pct:30,  fn: async()=>{ try{ await loadEmotionMaster(); }catch(e){} } },
    { msg:'학생 정보 준비 중...',        pct:60,  fn: async()=>{ await sleep(200); } },
    { msg:'봇 연결 확인 중...',          pct:85,  fn: async()=>{ await sleep(200); } },
    { msg:'준비 완료! 🌱',              pct:100, fn: async()=>{ await sleep(100); } },
  ];

  for (var s of steps) {
    if(status) status.textContent = s.msg;
    setProgress(s.pct);
    await s.fn();
    await sleep(500);
  }

  await sleep(600);
  document.getElementById('screen-loading').classList.add('hidden');
  document.getElementById('screen-nfc').classList.remove('hidden');
  focusNfcInput();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function loadEmotionMaster() {
  var res = await api('get_emotion_master', {});
  if (res.status === 'ok') STATE.emotions = res.data.emotions;

// ════════════════════════════════════════
// NFC 처리 (ACR122U HID 방식)
// ════════════════════════════════════════
var nfcBuffer = '';
var nfcTimer  = null;

function focusNfcInput() {
  var inp = document.getElementById('nfc-input');
  if (inp) { inp.value = ''; inp.focus(); }
}

document.addEventListener('DOMContentLoaded', () => {
  var nfcInp = document.getElementById('nfc-input');
  nfcInp.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      handleNfcUid(nfcBuffer.trim());
      nfcBuffer = '';
    } else {
      nfcBuffer += e.key;
    }
    clearTimeout(nfcTimer);
    nfcTimer = setTimeout(() => { nfcBuffer = ''; }, 200);
  });

  // 화면 클릭 시 포커스 복원
  document.addEventListener('click', e => {
    if (!e.target.matches('input,button,textarea,select,a')) {
      focusNfcInput();
    }
  });
});

async function handleNfcUid(uid) {
  if (!uid) return;

  // 등록 모달이 열려있으면 → 등록 처리
  if (!document.getElementById('modal-nfc-register').classList.contains('hidden')) {
    handleRegisterNfc(uid);
    return;
  }

  // 일반 로그인 처리
  var msg = document.getElementById('nfcMsg');
  if(msg) msg.textContent = '확인 중...';

  var res = await api('login_nfc', { nfc_uid: uid });
  if (res.status === 'ok') {
    AUDIO.sfx('nfc');
    onLoginSuccess(res.data);
  } else {
    toast(res.message || '등록되지 않은 카드입니다');
    if(msg) msg.textContent = '카드를 대주세요';
    focusNfcInput();
  }
}

// ════════════════════════════════════════
// 로그인
// ════════════════════════════════════════
async function loginByPw() {
  var id = document.getElementById('login-id').value.trim();
  var pw = document.getElementById('login-pw').value;
  if (!id || !pw) { toast('아이디와 비밀번호를 입력하세요'); return; }

  var res = await api('login_pw', { id: id, pw: pw });
  if (res.status === 'ok') {
    AUDIO.sfx('login');
    closeModal('modal-login');
    onLoginSuccess(res.data);
  } else {
    AUDIO.sfx('error');
    toast(res.message);
  }
}

function onLoginSuccess(data) {
  STATE.role = data.role;
  STATE.user = data;

  document.getElementById('screen-nfc').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('headerUser').textContent =
    data.name + ' ' + (data.role==='teacher'?'선생님':data.role==='admin'?'(관리자)':'학생');

  if (data.role === 'admin' || data.role === 'teacher') {
    buildTeacherUI();
    loadDashboard();
    if (data.teacher_uid) loadStudents();
    setTimeout(initCal, 300);
  } else {
    buildStudentUI();
    loadTokenBalance();
  }
}

function buildTabs(tabs) {
  var bar    = document.getElementById('tabBar');
  var panels = document.getElementById('tabPanels');
  bar.innerHTML = '';
  panels.innerHTML = '';

  tabs.forEach((t, i) => {
    var btn = document.createElement('button');
    btn.className = 'tab-btn' + (i===0?' active':'');
    btn.textContent = t.label;
    btn.onclick = () => switchTab(i);
    bar.appendChild(btn);

    var panel = document.createElement('div');
    panel.className = 'tab-panel' + (i===0?' active':'');
    panel.id = 'panel-' + i;
    panel.innerHTML = t.html || '';
    panels.appendChild(panel);
  });
}

function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.querySelectorAll('.tab-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
}

    '</div>' +
    '<div class="card" id="recordList" style="margin-top:10px;min-height:60px"></div>';

var CAL = { year: new Date().getFullYear(), month: new Date().getMonth(), data: {} };

function calMove(dir) {
  CAL.month += dir;
  if (CAL.month > 11) { CAL.month = 0; CAL.year++; }
  if (CAL.month < 0)  { CAL.month = 11; CAL.year--; }
  renderCal();
}

function renderCal() {
  var y = CAL.year, m = CAL.month;
  var title = document.getElementById('calTitle');
  var grid  = document.getElementById('calGrid');
  if (!title || !grid) return;

  var monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  title.textContent = y + '년 ' + monthNames[m];

  var first = new Date(y, m, 1).getDay();
  var last  = new Date(y, m+1, 0).getDate();
  var today = new Date();

  var cells = '';
  for (var i = 0; i < first; i++) {
    cells += '<div></div>';
  }
  for (var d = 1; d <= last; d++) {
    var dateStr = y + '-' + ('0'+(m+1)).slice(-2) + '-' + ('0'+d).slice(-2);
    var count   = CAL.data[dateStr] || 0;
    var isToday = (today.getFullYear()===y && today.getMonth()===m && today.getDate()===d);
    var isSun   = (new Date(y,m,d).getDay()===0);
    var isSat   = (new Date(y,m,d).getDay()===6);
    var dayColor = isSun?'#e05050':isSat?'#4080e0':'var(--navy)';

    cells += '<div onclick="selectCalDay(\'' + dateStr + '\')" style="' +
      'cursor:pointer;border-radius:10px;padding:4px 2px;text-align:center;' +
      'background:' + (isToday ? 'var(--mint3)' : 'transparent') + ';' +
      'transition:background .2s">' +
      '<div style="font-size:12px;color:' + dayColor + ';font-weight:' + (isToday?'700':'400') + '">' + d + '</div>' +
      (count > 0
        ? '<div style="font-size:10px;color:var(--rose);opacity:0.7;line-height:1.2">♥' +
          (count > 1 ? '<span style="font-size:9px;color:var(--gray);opacity:0.65">' + count + '</span>' : '') +
          '</div>'
        : '<div style="height:16px"></div>') +
    '</div>';
  }
  grid.innerHTML = cells;
}

function selectCalDay(dateStr) {
  document.getElementById('recordList').innerHTML =
    '<div style="text-align:center;padding:12px;color:var(--gray);font-size:13px">불러오는 중...</div>';
  loadRecords(dateStr);
}

async function initCal() {
  var res = await api('get_emotions', { teacher_uid: STATE.user ? STATE.user.teacher_uid : '' });
  if (res.status === 'ok') {
    CAL.data = {};
    res.data.emotions.forEach(function(e) {
      var d = String(e.timestamp).slice(0,10);
      CAL.data[d] = (CAL.data[d] || 0) + 1;
    });
  }
  renderCal();
}

  sunny:         { emoji:'☀️', label:'맑음', sub:'학급 전체가 밝고 긍정적이에요!' },
  partly_cloudy: { emoji:'🌤', label:'구름 조금', sub:'전반적으로 안정적인 하루예요' },
  cloudy:        { emoji:'☁️', label:'구름 많음', sub:'가벼운 환기가 필요할 수 있어요' },
  rain:          { emoji:'☔', label:'비',    sub:'몇몇 친구들의 마음을 살펴봐요' },
  rainbow:       { emoji:'🌈', label:'무지개', sub:'다양한 감정이 공존하는 날이에요' },

};

async function loadDashboard() {
  var teacher_uid = STATE.user?.teacher_uid || '';
  var res = await api('get_dashboard', { teacher_uid });
  if (res.status !== 'ok') return;

  var d = res.data;
  STATE.dashboard = d;

  // 날씨
  var w = WEATHER_MAP[d.weather] || WEATHER_MAP.none;
  var box = document.getElementById('weatherBox');
  if(box) {
    var submitted = d.submitted || 0;
    var total     = d.total_students || 1;
    var ratio     = submitted / total;
    box.style.minHeight = Math.max(120, 120 + ratio * 80) + 'px';
  }
  setText('weatherEmoji', w.emoji);
  setText('weatherLabel', w.label);
  setText('weatherSub',   w.sub);

  // 통계
  setText('statTotal',  d.total_students);
  setText('statSubmit', d.submitted);
  setText('statMiss',   d.total_students - d.submitted);

  // 훈훈습도계
  for(var i=1;i<=5;i++){
    var dot = document.getElementById('wd'+i);
    if(dot) dot.classList.toggle('filled', i <= (d.warmth_count||0));
  }

  // 감정 분포
  var dist = document.getElementById('emotionDist');
  if(dist) dist.innerHTML =

function openNfcRegister() {

async function handleRegisterNfc(uid) {
  var statusEl = document.getElementById('nfcRegisterStatus');
  var uidEl    = document.getElementById('nfcRegisterUid');
  var animEl   = document.getElementById('nfcRegisterAnim');

  // 중복 확인
  var dup = await api('check_duplicate_nfc', { nfc_uid: uid });
  if(dup.status==='ok' && dup.data.duplicate) {
    statusEl.textContent = '이미 등록된 카드예요 (' + dup.data.name + ')';
    animEl.textContent = '❌';
    toast('이미 ' + dup.data.name + '의 카드입니다');
    await sleep(1500);
    statusEl.textContent = '다른 카드를 대주세요';
    animEl.textContent = '🪪';
    focusNfcInput();
    return;
  }

  // 성공 — 학생 폼으로
  STATE.nfcPending = uid;
  animEl.textContent = '✅';
  statusEl.textContent = 'UID 인식 완료!';
  uidEl.textContent = 'UID: ' + uid;

  await sleep(800);
  closeModal('modal-nfc-register');

  // 학생 폼 채우기
  document.getElementById('sf-nfc-uid').value = uid;
  document.getElementById('sf-name').value = '';
  document.getElementById('sf-num').value = '';
  document.getElementById('sf-id').value = '';
  document.getElementById('sf-pw').value = '';
  openModal('modal-student-form');
}

function generateId() {
  var u = STATE.user;
  var num = document.getElementById('sf-num').value;
  if(!num) { toast('번호를 먼저 입력하세요'); return; }

  var sn = (u.school_name||'xx').slice(0,2);
  var id = sn+'e'+String(u.year||2026).slice(-2)+(u.grade||'')+(u.class||'')+('0'+num).slice(-2);
  document.getElementById('sf-id').value = id;
}

function renderEmotionGrid(cat) {
  var grid = document.getElementById('microGrid');
  if(!grid) return;

  var pool = STATE.emotions.filter(e => !cat || e.category === cat);
  // 랜덤 7개 (긍정3 중립1 부정3 비율 유지)
  var pos = shuffle(pool.filter(e=>e.category==='positive')).slice(0,3);
  var neu = shuffle(pool.filter(e=>e.category==='neutral')).slice(0,1);
  var neg = shuffle(pool.filter(e=>e.category==='negative')).slice(0,3);
  var selected = shuffle([...pos,...neu,...neg]).slice(0,7);

  grid.innerHTML = selected.map(function(e){
    return '<div class="micro-btn" onclick="selectMicroBtn(this)" data-id="'+e.emotion_id+'" data-word="'+e.word+'">'+e.word+'</div>';
  }).join('') +
    '<div class="micro-btn custom-btn" onclick="openCustomEmotion()">✏️ 직접 쓰기</div>' +
    '<div class="micro-btn more-btn" onclick="openMoreEmotions(this.dataset.cat)" data-cat="'+(cat||'')+'">➕ 더보기</div>';
}

function shuffle(arr) {
  for(var i=arr.length-1;i>0;i--) {
    var j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// WebNFC 테스트
// ════════════════════════════════════════
async function testWebNFC() {
  // WebNFC 지원 여부 먼저 확인
  if (!('NDEFReader' in window)) {
    toast('❌ 이 브라우저는 WebNFC를 지원하지 않아요');
    var msg = '웨일/크롬 안드로이드에서만 WebNFC가 작동해요.\n\n' +
              '대신 ACR122U USB 리더기를 사용하면\nPC/태블릿에서도 NFC 태깅이 가능해요.';
    setTimeout(function(){ alert(msg); }, 500);
    return;
  }

  toast('📡 NFC 리더 시작 중...');
  try {
    var ndef = new NDEFReader();
    await ndef.scan();
    toast('✅ NFC 준비됐어요! 카드를 대주세요');

    ndef.onreadingerror = function() {
      toast('❌ 카드 읽기 오류');
    };

    ndef.onreading = function(event) {
      var uid = event.serialNumber || 'UID없음';
      toast('✅ NFC 작동! UID: ' + uid);
      alert('NFC 태깅 성공!\nUID: ' + uid + '\n\nWebNFC가 정상 작동해요 🎉');
    };
  } catch(err) {
    if (err.name === 'NotAllowedError') {
      toast('❌ NFC 권한이 거부됐어요');
      alert('NFC 권한을 허용해주세요.\n브라우저 설정에서 NFC 권한을 허용하거나\nHTTPS 환경인지 확인해주세요.');
    } else {
      toast('❌ NFC 오류: ' + err.message);
    }
  }
}

// ════════════════════════════════════════
// 시작
// ════════════════════════════════════════
window.addEventListener('load', startLoading);
</script>
